name: Sync Operating Procedures with API Docs repository

on:
  push:
    branches:
      # - master
      - MRETS-21958
env:
    REPOSITORY: mrets/api-docs
    BRANCH: MRETS-sync-operating-procedures

jobs:
  open_pr:
    name: Sync
    runs-on: ubuntu-latest
    steps:
     - name: Clone the repository
       uses: actions/checkout@v6
       with:
        repository: ${{ env.REPOSITORY}}
        token: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        ref: develop
        fetch-depth: 0

     - name: Configure Git
       run: |
          git config --global user.email "sofia.paoli@tarmac.io"
          git config --global user.name ${{ github.actor }}

     - name: Clean Working Directory
       run: |
            git checkout develop
            git pull origin develop
            git checkout -b ${{ env.BRANCH}}
            git commit --allow-empty -m "Sync changes from the operating-procedures repository"
            git checkout develop
            git merge ${{ env.BRANCH}} --ff-only
            git push origin develop

    #  - name: Create a PR to master
    #    env: 
    #     GH_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
    #    run: |
    #         gh pr create --base master --head ${{ env.BRANCH}} --title "Automated sync from the Operating Procedures repository" --body "This pull request was automatically generated after changes were merged into the Operating Procedures repository - PR Auto-generated by Github Actions" --repo github.com/mrets/api-docs 